<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الأدمن | عقاري</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">عقاري</a>
      <nav class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="properties.html">العقارات</a>
        <a href="add-property.html">إضافة عقار</a>
        <a href="my-properties.html">عقاراتي</a>
        <a href="admin.html" class="active">لوحة الأدمن</a>
        <a href="login.html" id="navAuthLink">دخول</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow">Admin Dashboard</span>
          <h1>لوحة الأدمن</h1>
        </div>
      </div>

      <div id="adminGate" class="empty-state hidden">هذه الصفحة للأدمن فقط. سجّل الدخول بحساب Admin أولًا.</div>

      <div id="adminContent" class="hidden">
        <div class="stats">
          <div class="stat-card"><strong id="statUsers">0</strong><span>مستخدم</span></div>
          <div class="stat-card"><strong id="statPending">0</strong><span>Pending</span></div>
          <div class="stat-card"><strong id="statApproved">0</strong><span>Approved</span></div>
          <div class="stat-card"><strong id="statRejected">0</strong><span>Rejected</span></div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="pendingTab">تحت المراجعة</button>
          <button class="tab-btn" data-tab="approvedTab">المعتمدة</button>
          <button class="tab-btn" data-tab="rejectedTab">المرفوضة</button>
          <button class="tab-btn" data-tab="usersTab">المستخدمون</button>
        </div>

        <section id="pendingTab" class="tab-panel active">
          <div id="pendingGrid" class="cards-grid"></div>
          <div id="pendingEmpty" class="empty-state hidden">لا توجد طلبات معلقة.</div>
        </section>

        <section id="approvedTab" class="tab-panel">
          <div id="approvedGrid" class="cards-grid"></div>
          <div id="approvedEmpty" class="empty-state hidden">لا توجد عقارات معتمدة.</div>
        </section>

        <section id="rejectedTab" class="tab-panel">
          <div id="rejectedGrid" class="cards-grid"></div>
          <div id="rejectedEmpty" class="empty-state hidden">لا توجد عقارات مرفوضة.</div>
        </section>

        <section id="usersTab" class="tab-panel">
          <div class="filters-bar single">
            <input id="userSearch" class="input" placeholder="ابحث بالاسم أو الجوال" />
          </div>
          <div class="table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>الاسم</th>
                  <th>الجوال</th>
                  <th>الدور</th>
                  <th>الحالة</th>
                  <th>إجراء</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    initLayout();
    initAdminPage();
  </script>
</body>
</html>
