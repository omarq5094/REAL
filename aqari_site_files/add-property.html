
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إضافة عقار</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>إضافة عقار</h1>

<form id="form">

<input name="property_id" placeholder="رقم العقار">
<input name="owner_id" placeholder="رقم المالك">
<input name="title" placeholder="العنوان">
<input name="category" placeholder="النوع">
<input name="city" placeholder="المدينة">
<input name="district" placeholder="الحي">
<input name="area" placeholder="المساحة">
<input name="price" placeholder="السعر">
<input name="description" placeholder="الوصف">
<input name="maps_url" placeholder="رابط الخريطة">

<button type="submit">إرسال</button>

</form>

<p id="msg"></p>

<script>

const api = 'https://script.google.com/macros/s/AKfycbwiUPVA2drkD3qfpi5PIIMm6KGxtRpnwCGKmw1GEGn4hsbDBbeqrVmQhfZafeaQw-l9/exec'

document.getElementById("form").onsubmit = async e=>{
e.preventDefault()

const data = Object.fromEntries(new FormData(e.target))

await fetch(api,{
method:"POST",
body:JSON.stringify(data)
})

document.getElementById("msg").innerText="تم إرسال العقار للمراجعة"

}

</script>

</body>
</html>
